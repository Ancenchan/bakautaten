<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utaten Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: #fafafa; }
        [v-cloak] { display: none; }
        /* 隐藏滚动条但保留功能 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-900">

<div id="app" v-cloak class="min-h-screen pb-20">
    <nav class="sticky top-0 z-10 bg-white/80 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-4xl mx-auto px-6 h-16 flex items-center justify-between">
            <h1 class="text-xl font-semibold tracking-tight text-rose-500">Music.Library</h1>
            <div class="flex items-center gap-4">
                <input v-model="config.token" type="password" placeholder="GitHub Token" 
                       class="text-xs border border-slate-200 rounded-md px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-rose-100 transition-all w-32 md:w-48">
                <button @click="pushToGithub" class="bg-slate-900 text-white text-xs font-medium px-4 py-2 rounded-md hover:bg-slate-800 transition-all shadow-sm">
                    部署同步
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 mt-12">
        <div class="flex flex-col md:flex-row gap-4 mb-10">
            <div class="relative flex-grow">
                <span class="absolute left-3 top-2.5 text-slate-400">🔍</span>
                <input v-model="searchText" placeholder="搜索歌曲或艺术家..." 
                       class="w-full pl-10 pr-4 py-2 bg-white border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-rose-100 transition-all shadow-sm">
            </div>
            <button @click="openModal()" class="inline-flex items-center justify-center rounded-lg bg-rose-50 px-4 py-2 text-sm font-medium text-rose-600 hover:bg-rose-100 transition-colors border border-rose-200">
                + 添加新曲目
            </button>
        </div>

        <div class="grid gap-3">
            <div v-for="(song, index) in filteredSongs" :key="index" 
                 class="group flex items-center justify-between p-4 bg-white border border-slate-100 rounded-xl hover:border-rose-200 hover:shadow-md transition-all duration-300">
                <div class="flex-grow cursor-pointer" @click="window.open(song.url, '_blank')">
                    <p class="font-medium text-[15px] group-hover:text-rose-500 transition-colors">{{ song.jp }}</p>
                    <p class="text-xs text-slate-400 mt-1">{{ song.cn || '暂无译名' }}</p>
                </div>
                <div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button @click="openModal(index)" class="text-xs text-slate-500 hover:text-slate-800 px-2 py-1">编辑</button>
                    <button @click="removeSong(index)" class="text-xs text-rose-400 hover:text-rose-600 px-2 py-1">删除</button>
                </div>
            </div>
            <div v-if="filteredSongs.length === 0" class="py-20 text-center text-slate-400 border-2 border-dashed border-slate-100 rounded-2xl">
                还没有找到相关的曲目哦 🎵
            </div>
        </div>
    </main>

    <div v-if="showModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/20 backdrop-blur-[2px]">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl border border-slate-100 p-6 animate-in fade-in zoom-in duration-200">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-semibold tracking-tight">{{ editingIndex !== null ? '修改曲目' : '添加新曲目' }}</h3>
                <button @click="closeModal" class="text-slate-400 hover:text-slate-600 text-xl">×</button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-medium text-slate-500 mb-1 block">日语歌名</label>
                    <input v-model="tempSong.jp" class="w-full px-3 py-2 border border-slate-200 rounded-md focus:outline-none focus:ring-2 focus:ring-rose-100">
                </div>
                <div>
                    <label class="text-xs font-medium text-slate-500 mb-1 block">中文翻译 (可选)</label>
                    <input v-model="tempSong.cn" class="w-full px-3 py-2 border border-slate-200 rounded-md focus:outline-none focus:ring-2 focus:ring-rose-100">
                </div>
                <div>
                    <label class="text-xs font-medium text-slate-500 mb-1 block">Utaten 链接</label>
                    <input v-model="tempSong.url" class="w-full px-3 py-2 border border-slate-200 rounded-md focus:outline-none focus:ring-2 focus:ring-rose-100">
                </div>
                <div class="pt-4 flex gap-3">
                    <button @click="closeModal" class="flex-1 px-4 py-2 border border-slate-200 rounded-md text-sm font-medium hover:bg-slate-50 transition-colors">取消</button>
                    <button @click="saveSong" class="flex-1 px-4 py-2 bg-slate-900 text-white rounded-md text-sm font-medium hover:bg-slate-800 shadow-sm">确认保存</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        data() {
            return {
                songs: [],
                searchText: '',
                showModal: false,
                editingIndex: null,
                tempSong: { jp: '', cn: '', url: '' },
                config: {
                    token: localStorage.getItem('gh_token') || '',
                    owner: 'YOUR_USERNAME', // 🔴 必须修改：你的 GitHub 用户名
                    repo: 'YOUR_REPO',       // 🔴 必须修改：你的仓库名
                    path: 'data.json'
                }
            }
        },
        computed: {
            filteredSongs() {
                const search = this.searchText.toLowerCase();
                return this.songs.filter(s => s.jp.toLowerCase().includes(search) || (s.cn && s.cn.toLowerCase().includes(search)));
            }
        },
        watch: {
            'config.token'(v) { localStorage.setItem('gh_token', v); }
        },
        mounted() {
            this.fetchData();
        },
        methods: {
            async fetchData() {
                try {
                    const r = await fetch(`./data.json?t=${Date.now()}`);
                    this.songs = await r.json();
                } catch (e) { console.warn("未找到 data.json，请先同步数据。"); }
            },
            openModal(index = null) {
                this.editingIndex = index;
                this.tempSong = index !== null ? { ...this.songs[index] } : { jp: '', cn: '', url: '' };
                this.showModal = true;
            },
            saveSong() {
                if (!this.tempSong.jp || !this.tempSong.url) return alert("请至少填写歌名和链接哦");
                if (this.editingIndex !== null) this.songs[this.editingIndex] = { ...this.tempSong };
                else this.songs.unshift({ ...this.tempSong });
                this.closeModal();
            },
            removeSong(index) {
                if(confirm('确定要删除这首曲目吗？')) this.songs.splice(index, 1);
            },
            closeModal() { this.showModal = false; },
            async pushToGithub() {
                if (!this.config.token || this.config.owner === 'YOUR_USERNAME') return alert('请先输入正确的 Token 并配置代码中的用户名/仓库名');
                const url = `https://api.github.com/repos/${this.config.owner}/${this.config.repo}/contents/${this.config.path}`;
                try {
                    const res = await fetch(url, { headers: { Authorization: `token ${this.config.token}` } });
                    const fileData = await res.json();
                    const sha = fileData.sha;
                    const content = btoa(unescape(encodeURIComponent(JSON.stringify(this.songs, null, 2))));
                    
                    const update = await fetch(url, {
                        method: 'PUT',
                        headers: { Authorization: `token ${this.config.token}` },
                        body: JSON.stringify({ message: "Update 🌸", content, sha })
                    });
                    
                    if(update.ok) alert('同步成功！GitHub 可能需要几十秒来刷新 Pages。');
                    else alert('同步失败，请检查 Token 权限。');
                } catch (e) {
                    alert('网络错误或文件不存在，请确保仓库已有 data.json');
                }
            }
        }
    }).mount('#app');
</script>
</body>
</html>
