<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 My Utaten Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { pk: { 50: '#fff1f2', 100: '#ffe4e6', 200: '#fecdd3', 300: '#fda4af', 400: '#fb7185' } },
                    borderRadius: { 'fuwari': '1.5rem' }
                }
            }
        }
    </script>

    <style>
        /* 1. 鼠标指针配置 */
        html, body { cursor: url('./normal.cur'), auto !important; }
        input, textarea { cursor: url('./text.cur'), text !important; }
        a, button, .btn-click { cursor: url('./link.cur'), pointer !important; }

        [v-cloak] { display: none; }
        
        .bg-anime {
            position: fixed; inset: 0; z-index: -1;
            background-image: url('https://images.alphacoders.com/134/1342676.png'); /* 建议换成本地壁纸 */
            background-size: cover; background-position: center;
        }

        .glass {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* 移动端溢出修正 */
        .container-safe { width: 100%; max-width: 800px; margin: 0 auto; padding: 0 1.25rem; }
    </style>
</head>
<body class="font-sans text-slate-600 antialiased selection:bg-pk-100">

<div id="app" v-cloak class="min-h-screen flex flex-col items-center">
    <div class="bg-anime"><div class="absolute inset-0 bg-pk-50/10"></div></div>

    <header class="mt-12 mb-8 text-center px-4">
        <div class="inline-block relative">
            <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Lucky" 
                 class="w-20 h-20 rounded-full border-4 border-white/50 shadow-sm glass mb-4 object-cover">
            <div class="absolute bottom-4 right-0 w-4 h-4 bg-green-400 border-2 border-white rounded-full"></div>
        </div>
        <h2 class="text-xl font-light tracking-widest text-pk-400">YOUR_NAME</h2>
        <p class="text-xs text-pk-300 mt-2 font-light italic">「 记录每一份在旋律中绽放的心情 」</p>
    </header>

    <div class="container-safe">
        <div class="flex flex-col gap-3 mb-8">
            <div class="relative flex items-center">
                <input v-model="searchText" placeholder="搜索歌曲..." 
                       class="w-full px-5 py-2.5 glass rounded-full focus:outline-none focus:ring-2 focus:ring-pk-100 text-sm placeholder:text-pk-200 transition-all">
                
                <button @click="isAdminMode = !isAdminMode" class="ml-2 p-2 text-pk-200 hover:text-pk-400 transition-colors">
                    {{ isAdminMode ? '✨' : '⚙️' }}
                </button>
            </div>

            <transition enter-active-class="transition duration-300" enter-from-class="opacity-0 -translate-y-2" enter-to-class="opacity-100 translate-y-0">
                <div v-if="isAdminMode" class="flex gap-2 items-center glass p-3 rounded-2xl animate-in">
                    <input v-model="config.token" type="password" placeholder="Access Token" 
                           class="flex-grow text-xs bg-white/40 rounded-lg px-3 py-1.5 focus:outline-none">
                    <button @click="pushToGithub" class="text-[10px] bg-pk-400 text-white px-3 py-1.5 rounded-lg font-bold">SYNC</button>
                    <button @click="openModal()" class="text-[10px] bg-white text-pk-400 px-3 py-1.5 rounded-lg border border-pk-100 font-bold">+ ADD</button>
                </div>
            </transition>
        </div>

        <div class="grid grid-cols-1 gap-3">
            <div v-for="(song, index) in filteredSongs" :key="index" 
                 class="group glass p-4 rounded-2xl flex items-center justify-between hover:bg-white/40 transition-all duration-300">
                
                <div class="flex-grow cursor-pointer" @click="window.open(song.url, '_blank')">
                    <p class="text-[15px] font-medium text-slate-700 tracking-tight">{{ song.jp }}</p>
                    <p class="text-[10px] text-pk-300 mt-1 uppercase tracking-widest">{{ song.cn || 'Original' }}</p>
                </div>
                
                <div v-if="isAdminMode" class="flex gap-3">
                    <button @click="openModal(index)" class="text-[10px] text-pk-300 hover:text-pk-400">EDIT</button>
                    <button @click="removeSong(index)" class="text-[10px] text-red-300 hover:text-red-400">DEL</button>
                </div>
            </div>
        </div>

        <div v-if="filteredSongs.length === 0" class="py-20 text-center opacity-30 italic text-sm">
            No melodies found...
        </div>
    </div>

    <transition name="modal">
        <div v-if="showModal" class="fixed inset-0 z-50 flex items-center justify-center p-6">
            <div class="absolute inset-0 bg-pk-50/20 backdrop-blur-sm" @click="closeModal"></div>
            <div class="relative bg-white/90 glass w-full max-w-[320px] rounded-[2rem] p-8 shadow-2xl">
                <div class="space-y-4">
                    <input v-model="tempSong.jp" placeholder="日文曲名" class="w-full px-4 py-2.5 bg-white/50 border border-pk-50 rounded-xl text-sm outline-none">
                    <input v-model="tempSong.cn" placeholder="中文翻译" class="w-full px-4 py-2.5 bg-white/50 border border-pk-50 rounded-xl text-sm outline-none">
                    <input v-model="tempSong.url" placeholder="Utaten URL" class="w-full px-4 py-2.5 bg-white/50 border border-pk-50 rounded-xl text-sm outline-none">
                    <button @click="saveSong" class="w-full py-3 bg-pk-300 text-white rounded-xl text-sm font-medium hover:bg-pk-400 transition-all shadow-md">保存曲目</button>
                </div>
            </div>
        </div>
    </transition>

    <footer class="mt-auto py-8 text-[10px] text-pk-200 tracking-[0.2em] uppercase">
        Design by Fuwari Framework
    </footer>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        data() {
            return {
                isAdminMode: false,
                songs: [],
                searchText: '',
                showModal: false,
                editingIndex: null,
                tempSong: { jp: '', cn: '', url: '' },
                config: {
                    token: localStorage.getItem('gh_token') || '',
                    owner: 'ancenchan', // 🔴 修改
                    repo: 'bakautaten', // 🔴 修改
                    path: 'data.json'
                }
            }
        },
        computed: {
            filteredSongs() {
                const s = this.searchText.toLowerCase();
                return this.songs.filter(x => x.jp.toLowerCase().includes(s) || (x.cn && x.cn.toLowerCase().includes(s)));
            }
        },
        watch: {
            'config.token'(v) { localStorage.setItem('gh_token', v); }
        },
        mounted() {
            fetch(`./data.json?t=${Date.now()}`).then(r => r.json()).then(d => this.songs = d).catch(() => {});
        },
        methods: {
            openModal(index = null) {
                this.editingIndex = index;
                this.tempSong = index !== null ? { ...this.songs[index] } : { jp: '', cn: '', url: '' };
                this.showModal = true;
            },
            saveSong() {
                if (!this.tempSong.jp || !this.tempSong.url) return;
                if (this.editingIndex !== null) this.songs[this.editingIndex] = { ...this.tempSong };
                else this.songs.unshift({ ...this.tempSong });
                this.showModal = false;
            },
            removeSong(index) {
                if(confirm('真的要删掉吗？')) this.songs.splice(index, 1);
            },
            closeModal() { this.showModal = false; },
            async pushToGithub() {
                if (!this.config.token || this.config.owner === '你的用户名') return alert('Token 或配置错误');
                const url = `https://api.github.com/repos/${this.config.owner}/${this.config.repo}/contents/${this.config.path}`;
                try {
                    const res = await fetch(url, { headers: { Authorization: `token ${this.config.token}` } });
                    const fileData = await res.json();
                    const content = btoa(unescape(encodeURIComponent(JSON.stringify(this.songs, null, 2))));
                    const update = await fetch(url, {
                        method: 'PUT',
                        headers: { Authorization: `token ${this.config.token}` },
                        body: JSON.stringify({ message: "🌸 Library Sync", content, sha: fileData.sha })
                    });
                    if(update.ok) alert('同步成功啦！✨');
                } catch (e) { alert('同步出错了...'); }
            }
        }
    }).mount('#app');
</script>
</body>
</html>
