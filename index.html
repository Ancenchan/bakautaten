<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Utaten Sakura Library 🌸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Kosugi+Maru&display=swap" rel="stylesheet">
    <style>
        :root {
            --sakura-pink: #ffdeeb;
            --sakura-dark: #ff85c0;
            --sakura-soft: #fff0f6;
            --text-main: #6d4c41; /* 棕色文字比黑色更显温柔 */
        }

        body {
            font-family: 'Kosugi Maru', 'Microsoft YaHei', sans-serif;
            background-color: var(--sakura-soft);
            /* 加入淡淡的二次元背景纹理 */
            background-image: url("https://www.transparenttextures.com/patterns/cubes.png");
            color: var(--text-main);
        }

        /* 统一大圆角，更可爱 */
        .rounded-cute { border-radius: 24px; }
        .rounded-btn { border-radius: 99px; }

        /* 呼吸灯效果 */
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        .breathe-btn { animation: breathe 3s infinite ease-in-out; }

        [v-cloak] { display: none; }
        
        /* 隐藏滚动条 */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--sakura-pink); border-radius: 10px; }
    </style>
</head>
<body class="selection:bg-pink-200">

<div id="app" v-cloak class="min-h-screen pb-20">
    <nav class="sticky top-0 z-10 bg-white/60 backdrop-blur-xl border-b border-pink-100">
        <div class="max-w-4xl mx-auto px-6 h-16 flex items-center justify-between">
            <h1 class="text-2xl font-bold text-pink-500 flex items-center gap-2" style="font-family: 'ZCOOL KuaiLe';">
                <span>🌸</span> 歌のLibrary
            </h1>
            <div class="flex items-center gap-3">
                <input v-model="config.token" type="password" placeholder="Key (Github Token)" 
                       class="text-xs bg-white/80 border border-pink-200 rounded-btn px-4 py-2 focus:outline-none focus:ring-2 focus:ring-pink-300 w-32 md:w-48 transition-all">
                <button @click="pushToGithub" class="bg-pink-400 text-white text-xs font-bold px-5 py-2 rounded-btn hover:bg-pink-500 transition-all shadow-lg shadow-pink-200">
                    同步云端
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-6 mt-10">
        <div class="flex flex-col gap-6 mb-12">
            <div class="relative group">
                <div class="absolute -inset-1 bg-gradient-to-r from-pink-300 to-rose-300 rounded-cute blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>
                <input v-model="searchText" placeholder="输入你想找的曲子名称..." 
                       class="relative w-full px-6 py-4 bg-white border-2 border-pink-100 rounded-cute focus:outline-none focus:border-pink-300 text-lg transition-all shadow-sm">
                <span class="absolute right-6 top-4 text-2xl">🔍</span>
            </div>
            
            <button @click="openModal()" class="breathe-btn w-full py-3 bg-white border-2 border-dashed border-pink-300 text-pink-500 font-bold rounded-cute hover:bg-pink-50 transition-colors">
                + 点击添加新的心动旋律
            </button>
        </div>

        <div class="space-y-4">
            <div v-for="(song, index) in filteredSongs" :key="index" 
                 class="group relative bg-white/80 p-5 rounded-cute border-2 border-transparent hover:border-pink-200 hover:bg-white transition-all duration-300 shadow-sm hover:shadow-xl">
                
                <div class="flex items-center justify-between">
                    <div class="flex-grow cursor-pointer" @click="window.open(song.url, '_blank')">
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] bg-pink-100 text-pink-500 px-2 py-0.5 rounded-md font-bold uppercase tracking-wider">Song</span>
                            <p class="font-bold text-lg text-slate-700 group-hover:text-pink-500 transition-colors">{{ song.jp }}</p>
                        </div>
                        <p class="text-sm text-pink-300 mt-1 pl-1">✨ {{ song.cn || '还没有填中文名哦' }}</p>
                    </div>
                    
                    <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button @click="openModal(index)" class="p-2 hover:bg-pink-50 rounded-full text-pink-400">📝</button>
                        <button @click="removeSong(index)" class="p-2 hover:bg-red-50 rounded-full text-red-400">🗑️</button>
                    </div>
                </div>

                <div class="absolute -left-1 top-1/2 -translate-y-1/2 w-2 h-8 bg-pink-300 rounded-full opacity-0 group-hover:opacity-100 transition-all"></div>
            </div>

            <div v-if="filteredSongs.length === 0" class="py-20 text-center">
                <p class="text-4xl mb-4">空 々 度</p>
                <p class="text-pink-300 font-medium">还没有收藏任何曲子，快去添加吧！</p>
            </div>
        </div>
    </main>

    <div v-if="showModal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-pink-200/40 backdrop-blur-sm" @click="closeModal"></div>
        <div class="relative bg-white w-full max-w-sm rounded-[32px] shadow-2xl border-4 border-pink-50 p-8 animate-in fade-in zoom-in duration-300">
            <h3 class="text-xl font-bold text-pink-500 mb-6 text-center" style="font-family: 'ZCOOL KuaiLe';">
                {{ editingIndex !== null ? '· 修改曲目 ·' : '· 新增曲目 ·' }}
            </h3>
            <div class="space-y-5">
                <div>
                    <input v-model="tempSong.jp" placeholder="日语歌名 ( 필수 )" 
                           class="w-full px-4 py-3 bg-pink-50/50 border-none rounded-2xl focus:ring-2 focus:ring-pink-300 outline-none text-sm">
                </div>
                <div>
                    <input v-model="tempSong.cn" placeholder="中文翻译" 
                           class="w-full px-4 py-3 bg-pink-50/50 border-none rounded-2xl focus:ring-2 focus:ring-pink-300 outline-none text-sm">
                </div>
                <div>
                    <input v-model="tempSong.url" placeholder="Utaten 链接 URL" 
                           class="w-full px-4 py-3 bg-pink-50/50 border-none rounded-2xl focus:ring-2 focus:ring-pink-300 outline-none text-sm">
                </div>
                <div class="pt-4 flex gap-3">
                    <button @click="saveSong" class="flex-1 py-3 bg-pink-400 text-white rounded-2xl font-bold shadow-lg shadow-pink-100 hover:bg-pink-500 transition-all">确认喵！</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp } = Vue;
    createApp({
        data() {
            return {
                songs: [],
                searchText: '',
                showModal: false,
                editingIndex: null,
                tempSong: { jp: '', cn: '', url: '' },
                config: {
                    token: localStorage.getItem('gh_token') || '',
                    owner: '你的用户名', 
                    repo: '仓库名',     
                    path: 'data.json'
                }
            }
        },
        computed: {
            filteredSongs() {
                const s = this.searchText.toLowerCase();
                return this.songs.filter(x => x.jp.toLowerCase().includes(s) || (x.cn && x.cn.toLowerCase().includes(s)));
            }
        },
        watch: {
            'config.token'(v) { localStorage.setItem('gh_token', v); }
        },
        mounted() {
            fetch(`./data.json?t=${Date.now()}`).then(r => r.json()).then(d => this.songs = d).catch(() => {});
        },
        methods: {
            openModal(index = null) {
                this.editingIndex = index;
                this.tempSong = index !== null ? { ...this.songs[index] } : { jp: '', cn: '', url: '' };
                this.showModal = true;
            },
            saveSong() {
                if (!this.tempSong.jp || !this.tempSong.url) return;
                if (this.editingIndex !== null) this.songs[this.editingIndex] = { ...this.tempSong };
                else this.songs.unshift({ ...this.tempSong });
                this.showModal = false;
            },
            removeSong(index) {
                if(confirm('真的要删掉这首歌吗？(˚ ˃̣̣̥᷄⌓˂̣̣̥᷅ )')) this.songs.splice(index, 1);
            },
            closeModal() { this.showModal = false; },
            async pushToGithub() {
                if (!this.config.token || this.config.owner === '你的用户名') return alert('记得配置 Token 和用户名哦！');
                const url = `https://api.github.com/repos/${this.config.owner}/${this.config.repo}/contents/${this.config.path}`;
                try {
                    const res = await fetch(url, { headers: { Authorization: `token ${this.config.token}` } });
                    const fileData = await res.json();
                    const content = btoa(unescape(encodeURIComponent(JSON.stringify(this.songs, null, 2))));
                    const update = await fetch(url, {
                        method: 'PUT',
                        headers: { Authorization: `token ${this.config.token}` },
                        body: JSON.stringify({ message: "🌸 Sakura Update", content, sha: fileData.sha })
                    });
                    if(update.ok) alert('同步成功啦！好棒喵！✨');
                    else alert('同步出错了，检查下 Token 权限吧~');
                } catch (e) { alert('同步出错了喵...'); }
            }
        }
    }).mount('#app');
</script>
</body>
</html>
